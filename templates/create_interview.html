{% extends "base.html" %}
{% block title %}면접 생성 - 면접 평가 시스템{% endblock %}

{% block content %}
<nav aria-label="breadcrumb">
    <ol class="breadcrumb">
        <li class="breadcrumb-item"><a href="{{ url_for('interviews') }}">면접 관리</a></li>
        <li class="breadcrumb-item active">새 면접 생성</li>
    </ol>
</nav>

<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0"><i class="bi bi-plus-circle"></i> 새 면접 생성</h4>
            </div>
            <div class="card-body p-4">
                <form method="POST">
                    <div class="mb-3">
                        <label for="title" class="form-label fw-bold">면접명 <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="title" name="title"
                               placeholder="예: 2024년 상반기 연구원 채용 면접" required>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="date" class="form-label fw-bold">면접 날짜 <span class="text-danger">*</span></label>
                            <input type="date" class="form-control" id="date" name="date" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="hire_count" class="form-label fw-bold">채용 인원 수</label>
                            <input type="number" class="form-control" id="hire_count" name="hire_count"
                                   min="1" value="1" required>
                        </div>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-bold">심사위원 선택 <span class="text-danger">*</span></label>
                        {% if judges %}
                        {% for judge in judges %}
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" name="judges"
                                   value="{{ judge['id'] }}" id="judge_{{ judge['id'] }}">
                            <label class="form-check-label" for="judge_{{ judge['id'] }}">
                                {{ judge['name'] }} ({{ judge['username'] }})
                            </label>
                        </div>
                        {% endfor %}
                        {% else %}
                        <p class="text-muted">등록된 심사위원이 없습니다.
                            <a href="{{ url_for('manage_users') }}">사용자 관리</a>에서 추가해주세요.
                        </p>
                        {% endif %}
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary btn-lg">
                            <i class="bi bi-check-lg"></i> 면접 생성
                        </button>
                        <a href="{{ url_for('interviews') }}" class="btn btn-outline-secondary btn-lg">취소</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
