{% extends "base.html" %}
{% block title %}로그인 - 면접 평가 시스템{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card shadow">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <div class="d-inline-flex align-items-center justify-content-center rounded-circle bg-primary-subtle mb-3" style="width:80px;height:80px;">
                        <i class="bi bi-clipboard-check fs-1 text-primary"></i>
                    </div>
                    <h2 class="fw-bold mt-2">면접 평가 시스템</h2>
                    <p class="text-muted">산학협력단 · 2026 혁신지원사업 직원채용</p>
                </div>
                <form method="POST">
                    <div class="mb-3">
                        <label for="username" class="form-label">아이디</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-person"></i></span>
                            <input type="text" class="form-control" id="username" name="username"
                                   placeholder="아이디를 입력하세요" required autofocus>
                        </div>
                    </div>
                    <div class="mb-4">
                        <label for="password" class="form-label">비밀번호</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-lock"></i></span>
                            <input type="password" class="form-control" id="password" name="password"
                                   placeholder="비밀번호를 입력하세요" required>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 btn-lg" style="background:linear-gradient(135deg,#1a237e,#283593);border:none;">
                        <i class="bi bi-box-arrow-in-right"></i> 로그인
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
